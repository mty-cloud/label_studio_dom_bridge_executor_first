name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装 PyInstaller
        run: pip install pyinstaller

      - name: 编译为 .exe
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --noconsole ^
            --name "LabelStudio助手" ^
            --add-data "bridge;bridge" ^
            --add-data "config;config" ^
            --add-data "install_bookmarklet.html;." ^
            --add-data "README.md;." ^
            --add-data "STAFF_QUICK_START.md;." ^
            --hidden-import "queue" ^
            --hidden-import "threading" ^
            --hidden-import "json" ^
            --hidden-import "http.server" ^
            --hidden-import "urllib.parse" ^
            --hidden-import "mimetypes" ^
            src/main.py

      - name: 打包完整使用包（.exe + 浏览器安装说明）
        shell: cmd
        run: |
          copy install_bookmarklet.html dist\
          copy README.md dist\
          copy STAFF_QUICK_START.md dist\
          copy bridge\bookmarklet.txt dist\
          mkdir dist\bridge
          copy bridge\bookmarklet.txt dist\bridge\
          dir dist\

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LabelStudio助手-Windows-x64
          path: dist/*

      - name: 创建 Release（有 tag 才触发）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LabelStudio助手.exe
          generate_release_notes: true
